version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: retailpos-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourSecurePassword123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourSecurePassword123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: retailpos-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: .
      dockerfile: IdentityService/Dockerfile
    container_name: identity-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5001:8080"

  catalog-service:
    build:
      context: .
      dockerfile: CatalogService/Dockerfile
    container_name: catalog-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5002:8080"

  orders-service:
    build:
      context: .
      dockerfile: OrdersService/Dockerfile
    container_name: orders-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5003:8080"

  admin-service:
    build:
      context: .
      dockerfile: AdminService/Dockerfile
    container_name: admin-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5004:8080"

  payment-service:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    container_name: payment-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5005:8080"

  returns-service:
    build:
      context: .
      dockerfile: ReturnsService/Dockerfile
    container_name: returns-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5006:8080"

  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: notification-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5176:8080"

  ai-service:
    build:
      context: .
      dockerfile: AIService/Dockerfile
    container_name: ai-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "5007:8080"

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    volumes:
      - ./ApiGateway/ocelot.docker.json:/app/ocelot.json
    depends_on:
      - identity-service
      - catalog-service
      - orders-service
      - admin-service
      - payment-service
      - returns-service
      - ai-service
    ports:
      - "5000:8080"

  ui:
    build:
      context: ./pos-ui
      dockerfile: Dockerfile
    container_name: retailpos-ui
    volumes:
      - ./pos-ui:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "4200:4200"
    depends_on:
      - api-gateway

networks:
  default:
    name: retailpos-network
