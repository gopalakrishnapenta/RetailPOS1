<aside class="sidebar glass-panel">
  <div class="sidebar-header">
    <div class="logo">
      <span class="logo-icon">POS</span>
      <h1>Retail</h1>
    </div>
  </div>

  <nav class="sidebar-nav">
    <!-- Admin-Only Links -->
    <div class="nav-section" *ngIf="userRole === 'Admin'">
      <p class="section-title">ADMINISTRATION</p>
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active" class="nav-item">
        <span class="icon">🏷️</span> Categories
      </a>
      <a routerLink="/admin/staff" routerLinkActive="active" class="nav-item">
        <span class="icon">👥</span> Staff
      </a>
      <a routerLink="/admin/stores" routerLinkActive="active" class="nav-item">
        <span class="icon">🏬</span> Stores
      </a>
      <a routerLink="/admin/returns" routerLinkActive="active" class="nav-item">
        <span class="icon">🔄</span> Returns
      </a>
      <a routerLink="/admin/transactions" routerLinkActive="active" class="nav-item">
        <span class="icon">📜</span> Transactions
      </a>
    </div>

    <!-- Store Manager Links -->
    <div class="nav-section" *ngIf="userRole === 'StoreManager'">
      <p class="section-title">STORE MANAGEMENT</p>
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a routerLink="/admin/inventory" routerLinkActive="active" class="nav-item">
        <span class="icon">📦</span> Inventory
      </a>
      <a routerLink="/admin/products" routerLinkActive="active" class="nav-item">
        <span class="icon">🛒</span> Products
      </a>
      <a routerLink="/admin/returns" routerLinkActive="active" class="nav-item">
        <span class="icon">🔄</span> Returns
      </a>
      <a routerLink="/admin/transactions" routerLinkActive="active" class="nav-item">
        <span class="icon">📜</span> Transactions
      </a>
    </div>

    <!-- POS / Cashier Links - Strictly for Cashiers -->
    <div class="nav-section" *ngIf="userRole === 'Cashier'">
      <p class="section-title">POS TERMINAL</p>
      <a routerLink="/pos/billing" routerLinkActive="active" class="nav-item">
        <span class="icon">💸</span> Billing
      </a>
      <a routerLink="/pos/returns" routerLinkActive="active" class="nav-item">
        <span class="icon">🔄</span> Returns
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="theme-toggle">
      <span class="theme-label">Theme</span>
      <button class="theme-btn" (click)="toggleTheme()">
        {{ theme === 'dark' ? 'Dark' : 'Light' }}
      </button>
    </div>
    <div class="user-profile">
      <div class="avatar">{{ userName[0]?.toUpperCase() }}</div>
      <div class="user-details">
        <span class="name">{{ userName }}</span>
        <span class="role">{{ userRole }}</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">
      <span class="icon">🚪</span> Logout
    </button>
  </div>
</aside>
