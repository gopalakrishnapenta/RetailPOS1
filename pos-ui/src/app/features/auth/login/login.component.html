<div class="login-container premium-card fade-in">
  <div class="login-header">
    <div class="brand-logo" style="margin: 0 auto 1.5rem auto; width: 64px; height: 64px; font-size: 2rem; border-radius: 16px;"></div>
    <h2>NexusPOS</h2>
    <p>{{ isOtpStep ? 'Verify your identity' : 'Sign in to your account to continue' }}</p>
  </div>
  
  <!-- Step 1: Login Form -->
  <form *ngIf="!isOtpStep" (ngSubmit)="onLogin()" #loginForm="ngForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="credentials.email" name="email" required placeholder="name@gmail.com">
    </div>
    
    <div class="form-group">
      <div style="display:flex; justify-content: space-between; margin-bottom: 0.5rem">
        <label style="margin:0">Password</label>
        <a routerLink="/auth/forgot-password" class="text-link">Forgot password?</a>
      </div>
      <div class="password-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="credentials.password" name="password" required placeholder="••••••••">
        <span class="toggle-password" (click)="showPassword = !showPassword">
          {{ showPassword ? '👁️' : '👁️‍🗨️' }}
        </span>
      </div>
    </div>
    
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    
    <button type="submit" [disabled]="!loginForm.valid || isLoading" class="btn btn-primary btn-block">
      {{ isLoading ? 'Checking...' : 'Sign In' }}
    </button>
  </form>

  <!-- Step 2: OTP Form -->
  <form *ngIf="isOtpStep" (ngSubmit)="onVerifyOtp()" #otpForm="ngForm">
    <div class="form-group">
      <label>Enter 6-Digit OTP</label>
      <div style="margin-bottom: 0.5rem;">
        <input type="text" [(ngModel)]="otpValue" name="otp" required minlength="6" maxlength="6" 
               placeholder="123456" 
               class="form-control" 
               style="letter-spacing: 0.5rem; text-align: center; font-size: 1.5rem; font-weight: bold;">
      </div>
      <p style="font-size: 0.8rem; color: #64748b;">
        We sent a code to {{ credentials.email }}.
      </p>
    </div>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <button type="submit" [disabled]="!otpForm.valid || isLoading" class="btn btn-primary btn-block">
      {{ isLoading ? 'Verifying...' : 'Verify & Login' }}
    </button>
    
    <button type="button" class="btn btn-link btn-block" (click)="cancelOtp()" style="margin-top: 1rem; color: #64748b;">
      Go Back
    </button>
  </form>

  <div *ngIf="!isOtpStep" class="divider"><span>OR</span></div>
  
  <div *ngIf="!isOtpStep" class="social-login">
    <asl-google-signin-button type="standard" size="large" [width]="240"></asl-google-signin-button>
  </div>

  <div *ngIf="!isOtpStep" class="auth-footer">
    Don't have an account? <a routerLink="/auth/signup" class="text-link" style="font-weight: 600;">Sign up</a>
  </div>
</div>
