<div class="login-container">
  <div class="login-card glass-panel">
    <div class="logo-wrapper">
      <div class="square-logo">N</div>
      <h1 class="brand-title">NexusPOS</h1>
      <p class="brand-subtitle">Create your account to get started</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="input-field" placeholder="Enter your email" [(ngModel)]="email">
    </div>
    
    <div class="form-group">
      <div class="label-row">
        <label>Password</label>
        <a routerLink="/login" class="forgot-password">Reset Password?</a>
      </div>
      <div class="password-input-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" class="input-field" placeholder="••••••••" [(ngModel)]="password">
        <span class="password-toggle" (click)="togglePasswordVisibility()">
          {{ showPassword ? '🔓' : '👁️' }}
        </span>
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="password-input-wrapper">
        <input [type]="showConfirmPassword ? 'text' : 'password'" class="input-field" placeholder="••••••••" [(ngModel)]="confirmPassword">
        <span class="password-toggle" (click)="toggleConfirmPasswordVisibility()">
          {{ showConfirmPassword ? '🔓' : '👁️' }}
        </span>
      </div>
    </div>

    <div *ngIf="isRegistered" class="form-group animate-fade-in">
      <label>Email Verification Code</label>
      <input type="text" class="input-field" placeholder="6-digit code" [(ngModel)]="verificationOtp">
      <p class="helper-text">Check your email for the verification code.</p>
    </div>
    
    <button class="btn btn-primary w-full" (click)="onSubmit()" [disabled]="isLoading">
      <span *ngIf="!isLoading">{{ isRegistered ? 'Verify & Continue' : 'Register' }}</span>
      <span *ngIf="isLoading">{{ isRegistered ? 'Verifying...' : 'Registering...' }}</span>
    </button>

    <div class="divider">
      <span>OR</span>
    </div>

    <div id="googleSignupBtn" class="google-btn-container"></div>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log In</a></p>
    </div>
  </div>
</div>
