<div class="dashboard-layout">
  <app-admin-sidebar active="categories"></app-admin-sidebar>

  <div class="main-content">
    <h1 class="title">Category Management</h1>
    
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
      <div class="premium-card">
        <h3>All Product Categories</h3>
        <table class="premium-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Description</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of categories" [style.opacity]="c.isActive ? '1' : '0.6'">
              <td>#{{ c.id }}</td>
              <td>{{ c.name }}</td>
              <td>{{ c.description }}</td>
              <td><span class="badge" [class.badge-success]="c.isActive" [class.badge-danger]="!c.isActive">{{ c.isActive ? 'Active' : 'Disabled' }}</span></td>
              <td>
                <button class="btn btn-sm btn-outline" (click)="editCategory(c)" style="margin-right: 5px;">Edit</button>
                <button class="btn btn-sm" [class.btn-danger]="c.isActive" [class.btn-success]="!c.isActive" (click)="toggleStatus(c)">
                  {{ c.isActive ? 'Disable' : 'Enable' }}
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="premium-card">
        <h3>{{ isEditing ? 'Edit Category' : 'Add New Category' }}</h3>
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Category Name</label>
            <input type="text" [(ngModel)]="newCat.name" name="name" required placeholder="e.g. Health & Beauty">
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" [(ngModel)]="newCat.description" name="desc" placeholder="Brief details about the category">
          </div>
          <button type="submit" class="btn btn-primary btn-block">{{ isEditing ? 'Update Category' : 'Add Category' }}</button>
          <button *ngIf="isEditing" type="button" class="btn btn-secondary btn-block" (click)="cancelEdit()">Cancel</button>
        </form>
      </div>
    </div>
  </div>
</div>
