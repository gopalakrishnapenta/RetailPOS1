<div class="dashboard-layout">
  <app-admin-sidebar active="categories"></app-admin-sidebar>

  <div class="main-content">
    <h1 class="title">Category Management</h1>
    
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
      <div class="premium-card">
        <h3>All Product Categories</h3>
        <table class="premium-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Description</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of categories">
              <td>#{{ c.id }}</td>
              <td>{{ c.name }}</td>
              <td>{{ c.description }}</td>
              <td><span class="badge" [class.badge-success]="c.isActive">Active</span></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="premium-card">
        <h3>Add New Category</h3>
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Category Name</label>
            <input type="text" [(ngModel)]="newCat.name" name="name" required placeholder="e.g. Health & Beauty">
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" [(ngModel)]="newCat.description" name="desc" placeholder="Brief details about the category">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Add Category</button>
        </form>
      </div>
    </div>
  </div>
</div>
